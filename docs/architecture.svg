  .teal .sub { fill: #0f6e56; }
  /* gray group */
  .gray rect { fill: #f1efe8; stroke: #5f5e5a; stroke-width: 0.5; }
  .gray .title { fill: #2c2c2a; }
  .gray .sub { fill: #5f5e5a; }
  /* green group */
  .green rect { fill: #eaf3de; stroke: #3b6d11; stroke-width: 0.5; }
  .green .title { fill: #173404; }
  .green .sub { fill: #3b6d11; }
  /* amber group */
  .amber rect { fill: #faeeda; stroke: #854f0b; stroke-width: 0.5; }
  .amber .title { fill: #412402; }
  .amber .sub { fill: #854f0b; }
  /* purple group */
  .purple rect { fill: #eeedfe; stroke: #534ab7; stroke-width: 0.5; }
  .purple .title { fill: #26215c; }
  .purple .sub { fill: #534ab7; }
  /* coral group */
  .coral rect { fill: #faece7; stroke: #993c1d; stroke-width: 0.5; }
  .coral .title { fill: #4a1b0c; }
  .coral .sub { fill: #993c1d; }
  /* blue group */
  .blue rect { fill: #e6f1fb; stroke: #185fa5; stroke-width: 0.5; }
  .blue .title { fill: #042c53; }
  .blue .sub { fill: #185fa5; }
</style>

