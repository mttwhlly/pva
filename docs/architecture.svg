<svg width="680" viewBox="0 0 680 920" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
<title>CAQH Provider Verification Agent — architecture</title>
<desc>Two-tier diagram: local demo (top) and Azure production architecture (bottom)</desc>

<style>
  rect { rx: 6; }
